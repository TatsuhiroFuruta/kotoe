# ローカル開発専用。本番は Render(Rails) / Vercel(Next.js) / Neon(DB) を使い、
# 環境変数は各プラットフォームのダッシュボードで設定する（このファイルは使わない）。
#
# 初回セットアップ:
#   cp .env.example .env.development
#   cp frontend/.env.example frontend/.env.development
services:
  db:
    image: postgres:16
    env_file:
      - .env.development
    environment:
      TZ: Asia/Tokyo
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      # $$ は compose に展開させず、コンテナ内のシェルで env_file の値を解決させるため。
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    env_file:
      # Rails 専用の秘密（CLOUDINARY_URL / OPENAI_API_KEY）は backend/.env.development に
      # 分けて置き、frontend コンテナには渡さない（issue 3-1 で追加）。
      - .env.development
    environment:
      RAILS_ENV: development
      TZ: Asia/Tokyo
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      # gem をホストのバインドマウントから切り離す
      - bundle:/usr/local/bundle
    depends_on:
      db:
        condition: service_healthy
    tty: true
    stdin_open: true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    env_file:
      - frontend/.env.development
    environment:
      TZ: Asia/Tokyo
    ports:
      - "3001:3000"
    volumes:
      - ./frontend:/app
      # ホストの node_modules でコンテナ内のものを上書きさせない。
      # このボリュームはイメージ内の node_modules から初回に作られるため、ベースイメージを
      # 変えたときは `docker volume rm kotoe_node_modules` で作り直すこと（古い中身が残る）。
      - node_modules:/app/node_modules
    command: npm run dev

volumes:
  db_data:
  bundle:
  node_modules:
